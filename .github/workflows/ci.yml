# Smoke tests for release readiness (incl. macOS without local Apple hardware)
name: ci

on:
  push:
    branches: [main, master]
    paths:
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "src/**"
      - "web/**"
      - "packages/**"
      - "test/**"
      - "scripts/smoke-web.mjs"
      - "start.sh"
      - "start.command"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "src/**"
      - "web/**"
      - "packages/**"
      - "test/**"
      - "scripts/smoke-web.mjs"
      - "start.sh"
      - "start.command"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm install

      - name: Domain unit tests
        run: npm test

  smoke-web:
    name: smoke-web (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root
        run: npm install

      # web/ 是独立 package（deps 不在根 lock 里）；不装则 vite build 找不到 @vitejs/plugin-react
      - name: Install frontend deps
        run: npm --prefix web ci

      - name: Build frontend
        run: npm run web:build

      # 仓库不提交个人配置；冒烟用示例配置（与 start.sh 首启一致）
      - name: Seed example config
        run: |
          test -f liyuan.config.json || cp liyuan.config.example.json liyuan.config.json
          test -f liyuan.agent.json || cp liyuan.agent.example.json liyuan.agent.json

      - name: Web smoke (no LLM)
        run: node scripts/smoke-web.mjs
        timeout-minutes: 8

  launcher-unix:
    name: launcher scripts (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: start.sh / start.command are executable text
        run: |
          test -f start.sh
          test -f start.command
          head -n1 start.sh | grep -q '#!/usr/bin/env bash'
          head -n1 start.command | grep -q '#!/bin/bash'
          # LF only (no CR)
          ! grep -q $'\r' start.sh
          ! grep -q $'\r' start.command
          bash -n start.sh
          bash -n start.command
