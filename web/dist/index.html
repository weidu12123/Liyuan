<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />

		<meta name="theme-color" content="#1a1614" media="(prefers-color-scheme: dark)" />

		<meta name="apple-mobile-web-app-capable" content="yes" />

		<meta name="application-name" content="梨园" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="/logo-192.png" type="image/png" sizes="192x192" />
		<link rel="apple-touch-icon" href="/logo-180.png" sizes="180x180" />
		<link rel="apple-touch-icon" href="/logo-192.png" sizes="192x192" />
		<link rel="apple-touch-icon" href="/logo-512.png" sizes="512x512" />
		<title>梨园</title>
		<script>
			/* 尽早应用主题，避免白昼闪一下 */
			try {
				var t = localStorage.getItem("liyuan.theme");
				if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
			} catch (e) {}
			/* rebuild 后 SW 若仍用旧 HTML 指已删 JS，会白屏：探测 root 为空则卸 SW 强刷一次 */
			window.addEventListener("load", function () {
				setTimeout(function () {
					try {
						var root = document.getElementById("root");
						if (!root || root.childNodes.length > 0) return;
						if (sessionStorage.getItem("liyuan.sw-rescue") === "1") return;
						sessionStorage.setItem("liyuan.sw-rescue", "1");
						var done = function () {
							location.reload();
						};
						if (!("serviceWorker" in navigator)) return done();
						navigator.serviceWorker
							.getRegistrations()
							.then(function (regs) {
								return Promise.all(regs.map(function (r) { return r.unregister(); }));
							})
							.then(function () {
								return caches.keys();
							})
							.then(function (keys) {
								return Promise.all(keys.map(function (k) { return caches.delete(k); }));
							})
							.then(done)
							.catch(done);
					} catch (e) {}
				}, 2500);
			});
		</script>
		<script type="module" crossorigin src="/assets/index-KvfVQrvr.js"></script>
		<link rel="stylesheet" crossorigin href="/assets/index-BQmhZJAm.css">
	</head>
	<body>
		<div id="root"></div>
	</body>
</html>
